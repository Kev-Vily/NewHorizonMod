mod.new-horizon.name = New Horizon
mod.new-horizon.author = Yuria & Lao
mod.new-horizon.description = Rilis Beta. Kampanye Tidak Termasuk.\n\nSaat ini berisi konten yang sudah stabil dan pilihan vanilla override.\n\nMod dapat dimainkan sebagai ekstensi tambahan untuk Serpulo dan Erekir.\n\nKampanye masih dalam proses pengembangan.
mod.new-horizon.subtitle = Rilis Beta. Kampanye Tidak Termasuk.

new-horizon = NEW HORIZON

