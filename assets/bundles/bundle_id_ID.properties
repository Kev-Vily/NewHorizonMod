block.new-horizon-logistics-directional-router.name = Pengarah Logistik
block.new-horizon-logistics-directional-router.description = Item yang dimasukkan dapat didistribusikan secara merata ke tiga arah lainnya. Hanya menerima barang dari sisi belakang. Dapat dikonfigurasi sebagai penyortir barang.
block.new-horizon-logistics-directional-merger.name = Penggabung Logistik
block.new-horizon-logistics-directional-merger.description = Penggabungan satu arah. Menggabungkan tiga input menjadi satu arah.

