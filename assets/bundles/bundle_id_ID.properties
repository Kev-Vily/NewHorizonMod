block.new-horizon-speed-module.description = Meningkatkan kecepatan penambang yang ditargetkan secara signifikan. Membutuhkan lebih banyak tenaga.
block.new-horizon-speed-module-mk2.name = Pemercepat Tekanan MK2
block.new-horizon-speed-module-mk2.description = Versi yang diperbarui dari pemercepat tekanan.
block.new-horizon-refine-module.name = Prosesor Penyulingan
block.new-horizon-refine-module.description = Menyuling beberapa sumber daya dan mengeluarkannya secara langsung. Membutuhkan lebih banyak tenaga dan mengurangi kecepatan pengeluaran item.
block.new-horizon-convertor-module.name = Konvertor
block.new-horizon-convertor-module.description = Mengonversi sumber daya dari planet lain.
block.new-horizon-delivery-module.name = Depot Pengirim Antar Dimensi
block.new-horizon-delivery-module.description = Langsung mengirimkan sumber daya ke penyimpanan inti melalui teknologi dimensi.


block.new-horizon-logistics-directional-merger.name = Penggabung Rel Logistik
block.new-horizon-logistics-directional-merger.description = Penggabungan satu arah. Menggabungkan tiga input menjadi satu arah.
block.new-horizon-logistics-directional-gate.name = Gerbang Rel Logistik
block.new-horizon-logistics-directional-gate.description = Komponen logistik yang berfungsi sebagai gerbang luapan atau gerbang luapan terbalik.\nKlik untuk mengubah mode.
block.new-horizon-logistics-omni-gate.name = Gerbang Omni Logistik
block.new-horizon-logistics-omni-gate.description = Menyaring item yang masuk di setiap arah.
block.new-horizon-logistics-omni-sorter.name = Penyortir Omni Logistik
block.new-horizon-logistics-omni-sorter.description = Mengecualikan item yang masuk di setiap arah.
block.new-horizon-logistics-omni-blocker.name = Pemblokir Omni Logistik
block.new-horizon-logistics-omni-blocker.description = Komponen logistik yang dapat membatasi atau memperbolehkan item yang masuk ke segala arah.\nKlik untuk mengubah mode.
block.new-horizon-logistics-bridge.name = Jembatan Rel
block.new-horizon-logistics-bridge.description = Memindahkan item ke jembatan lain yang ada dalam jangkauan. Dapat menerima maksimal tiga input.
block.new-horizon-logistics-extend-bridge.name = Jembatan Rel Logistik
block.new-horizon-logistics-extend-bridge.description = Memindahkan item ke jembatan lain yang ada dalam jangkauan. Dapat menerima maksimal tiga input. Memiliki jarak yang lebih panjang. 
block.new-horizon-logistics-unloader.name = Pembongkar Rel
block.new-horizon-logistics-unloader.description = Membongkar muatan barang dari bangunan dibelakangnya. Dapat dikonfigurasi ke item tertentu. Meningkatkan kecepatan saat dikonfigurasi ke item tertentu.
