block.new-horizon-xen-iterator.name = Iterator Xen
block.new-horizon-xen-iterator.description = Mengubah kristal z dan kristal hydrox menjadi cairan superkritis, lalu mencampurnya untuk menghasilkan cairan phase xen yang berkarakteristik unik.
block.new-horizon-sand-cracker.name = Penghancur Pasir
block.new-horizon-sand-cracker.description = Menghancurkan material menjadi pasir.

