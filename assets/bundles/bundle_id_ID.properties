nh.new-feature.important-0 = [sky]Pratinjau Pembaruan New Horizon Versi 2.0.0
nh.new-feature.important-0-desc = Pembaruan ini mencakup inti baru, unit inti, unit tempur, bangunan, item, cairan, dan penyesuaian sistem.\n[gold]Server New Horizon sudah aktif kembali: 47.103.39.94[]

nh.new-feature.improve-0 = Air Raid System Fixed
nh.new-feature.improve-0-desc = Fixed raid triggers, alerts, and threat-tier logic; added threat HUD and map markers.

nh.new-feature.content-0 = New Cores and Core Units
nh.new-feature.content-0-desc = Adds four new cores: Conflux Core, Array Core, Nexus Core, and Cluster Core; adds four new core units: Scalar, Vector, Matrix, and Tensor.

nh.new-feature.content-1 = Conflux Core
nh.new-feature.content-1-desc = A 3x3 small outpost core with decent storage and defensive capabilities. Corresponding core unit: Scalar.

nh.new-feature.content-2 = Array Core
nh.new-feature.content-2-desc = A 4x4 medium base core with solid storage and defensive capabilities, capable of sustaining a mid-sized base. Corresponding core unit: Vector.

nh.new-feature.content-3 = Nexus Core
nh.new-feature.content-3-desc = A 5x5 large base core with excellent storage and defensive capabilities, capable of sustaining a large base. Corresponding core unit: Matrix.

nh.new-feature.content-4 = Cluster Core
nh.new-feature.content-4-desc = A 6x6 advanced base core, rebuilt from ancient technology. It has extremely high storage and defensive capabilities, capable of sustaining a massive base. Corresponding core unit: Tensor.

nh.new-feature.content-5 = New and Restored Units
nh.new-feature.content-5-desc = Adds or reworks several combat units: Relay, Apparition, Striker, Lymph, and Histone.

nh.new-feature.content-6 = Relay
nh.new-feature.content-6-desc = A light naval vessel equipped with two missile launchers.

nh.new-feature.content-7 = Apparition
nh.new-feature.content-7-desc = A medium-speed attack aircraft that fires spreading self-guided lightning pulses.

nh.new-feature.content-8 = Striker
nh.new-feature.content-8-desc = A heavy aerial support unit equipped with a long-range laser cannon.

nh.new-feature.content-9 = Lymph
nh.new-feature.content-9-desc = [red]This sub-entry has not been revealed yet.

nh.new-feature.content-10 = Histone
nh.new-feature.content-10-desc = [red]This sub-entry has not been revealed yet.

nh.new-feature.content-11 = New Buildings, Items, and Liquids
nh.new-feature.content-11-desc = Adds content related to logistics, manufacturing, power, synthesis, items, and liquids.

nh.new-feature.content-12 = Logistics System
nh.new-feature.content-12-desc = Adds and adjusts several logistics distribution buildings, and updates the logistics system logic.

nh.new-feature.content-13 = Production System
nh.new-feature.content-13-desc = Adds and adjusts several production-related buildings.

nh.new-feature.content-14 = Power System
nh.new-feature.content-14-desc = Adds and adjusts several power generation, power supply, and power support buildings.

nh.new-feature.content-15 = Synthesis System
nh.new-feature.content-15-desc = Adds and adjusts several synthesis, processing, and conversion buildings.

nh.new-feature.content-16 = Items and Liquids
nh.new-feature.content-16-desc = Adds multiple items and liquids, along with related processing chains.

nh.new-feature.balance-0 = Logistics System Adjustments
nh.new-feature.balance-0-desc = Adjusts and reworks part of the distribution system logic.

nh.new-feature.balance-1 = Balance Adjustments
nh.new-feature.balance-1-desc = Makes several balance adjustments.

nh.new-feature.fix-0 = Irregular Factory Crash Fix
nh.new-feature.fix-0-desc = Fixed a crash that could be caused by irregular factories.
