block.new-horizon-reinforced-item-source.description = Memiliki nyawa yang lebih tinggi.\n\n[accent]Konten yang dipilih telah ditulis dan dibaca secara ketat berdasarkan nama identitas asli untuk menghindari masalah dislokasi.

