block.new-horizon-hard-light-rail.name = Rel Cahaya Padat
block.new-horizon-hard-light-rail.description = Menggunakan foton statis dan padat sebagai pembawa untuk mengangkut barang.\nKlik untuk mengubah jalur barang yang masuk.
block.new-horizon-hard-light-rail.details = Konsep penggunaan jembatan foton statis pertama kali diusulkan dan diimplementasikan oleh Teknologi Guangquan, sebuah perusahaan yang sudah lama berdiri. Desain cahaya padat kini telah menjadi pilihan utama untuk logistik ringan generasi mendatang karena karakteristiknya yang hampir sepenuhnya bebas material.
block.new-horizon-stack-rail.name = Rel Tumpukan
block.new-horizon-stack-rail.description = Mengangkut barang yang dikemas. Gunakan penumpuk untuk memasukkan barang yang ditumpuk.
block.new-horizon-steady-stack-rail.name = Rel Tumpukan Stabil
block.new-horizon-steady-stack-rail.description = Mengangkut barang yang dikemas. Gunakan penumpuk untuk memasukkan barang yang ditumpuk. Memiliki stabilitas pengemasan dan kecepatan pengangkutan yang lebih tinggi.
block.new-horizon-light-stack-loader.name = Pemuat Tumpukan Ringan
block.new-horizon-light-stack-loader.description = Mengeluarkan item yang masuk ke dalam penumpuk agar dapat dikemas sampai 15 tumpukan item ke rel tumpukan.
block.new-horizon-heavy-stack-loader.name = Pemuat Tumpukan Berat
block.new-horizon-heavy-stack-loader.description =  Mengeluarkan item yang masuk ke dalam penumpuk agar dapat dikemas sampai 60 tumpukan item ke rel tumpukan.
block.new-horizon-multi-armor-conveyor.name = Konveyor Berlapis Baja-Multi
block.new-horizon-multi-armor-conveyor.description = Memindahkan barang ke depan. Lebih cepat daripada konveyor berbahan titanium. Tidak dapat menerima masukan dari samping.
block.new-horizon-multi-junction.name = Persimpangan Baja-Multi
block.new-horizon-multi-junction.description = Bertindak sebagai jembatan untuk dua konveyor yang bersimpangan. Lebih cepat daripada persimpangan biasa.
block.new-horizon-multi-router.name = Pengarah Baja-Multi
block.new-horizon-multi-router.description = Mendistribusikan barang ke 3 arah secara merata. Lebih cepat daripada pengarah biasa.
