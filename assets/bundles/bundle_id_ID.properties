#Items
item.new-horizon-hard-light.name = Cahaya Padat
item.new-horizon-hard-light.description = Kristal karbon-silikon yang terbentuk secara alami yang dihasilkan selama proses fisik berenergi tinggi seperti badai matahari dengan suhu yang panas, tersebar luas di permukaan midantha.
item.new-horizon-silicar.name = Silicar
item.new-horizon-silicar.description = Pencapaian rekayasa terbalik dari peninggalan midantha, material sangat ringan yang dibentuk oleh degenerasi foton dalam kondisi tertentu.
item.new-horizon-presstanium.name = Presstanium
item.new-horizon-presstanium.description = Sepotong logam yang keras dan kokoh.
item.new-horizon-processor-junior.name = Prosesor Junior
item.new-horizon-processor-junior.description = Sebuah prosesor dengan kecepatan standar.
item.new-horizon-processor-junior.details = Prosesor Intel
item.new-horizon-metal-oxhydrigen.name = Logam-Oksidrigen
item.new-horizon-metal-oxhydrigen.description = Bening seperti kristal!
item.new-horizon-zeta.name = Kristal Zeta
item.new-horizon-zeta.description = Sumber daya kristal yang bercahaya redup.
item.new-horizon-multiple-steel.name = Baja Berlapis
item.new-horizon-multiple-steel.description = Baja yang terbuat dari banyak lapisan logam yang direkatkan satu sama lain.
item.new-horizon-processor-senior.name = Prosesor Senior
item.new-horizon-processor-senior.description = Sebuah prosesor dengan kecepatan yang lebih tinggi.
item.new-horizon-processor-senior.details = Grafis Nvidia
item.new-horizon-irayrond-panel.name = Panel Iridium
item.new-horizon-irayrond-panel.description = Jenis logam khusus bersifat keras yang dapat bertahan terhadap suhu tinggi.
item.new-horizon-seton-alloy.name = Paduan Seton
item.new-horizon-seton-alloy.description = Berat, keras dan kokoh.
item.new-horizon-nodex-plate.name = Plat Nodeks
item.new-horizon-nodex-plate.description = Logam pintar yang dapat menyembuhkan dirinya sendiri.
item.new-horizon-ancimembrane.name = Ancimembran
item.new-horizon-ancimembrane.description = Teknologi kuno yang tidak diketahui.
item.new-horizon-hadronicomp.name = Hadronikom
item.new-horizon-hadronicomp.description = Dikenal sebagai quark? atau sebuah material gluon. Produknya tidak dapat dihancurkan, mencapai batas ilmu pengetahuan yang diketahui.
item.new-horizon-processor-hyper.name = Prosesor Hyper
item.new-horizon-processor-hyper.description = Chip komputasi hyperspace. Performa komputasi meningkat beberapa kali lipat.
item.new-horizon-fusion-core-energy.name = Gugusan Partikel Fusi
item.new-horizon-fusion-core-energy.description = Sejumlah besar partikel termonuklir yang terkandung secara magnetik, dapat digunakan langsung sebagai energi atau amunisi.
item.new-horizon-thermo-core-positive.name = Inti Thermo Positif
item.new-horizon-thermo-core-positive.description = Kontainer yang diisi dengan muatan thermo penuh energi.
item.new-horizon-thermo-core-negative.name = Inti Thermo Negatif
item.new-horizon-thermo-core-negative.description = Kontainer yang diisi dengan muatan thermo minim energi.
item.new-horizon-dark-energy.name = Energi Gelap
item.new-horizon-dark-energy.description = Rahasia alam semesta New Horizon.

#Liquids
liquid.new-horizon-ammonia.name = Amonia Terpolarisasi
liquid.new-horizon-ammonia.description = Amonia yang sangat basa terbentuk dalam kondisi khusus, terutama di lingkungan kuantum tinggi Midantha.
liquid.new-horizon-hydrazine.name = Hidrazin
liquid.new-horizon-hydrazine.description = Bahan bakar berenergi tinggi yang diperoleh dari amonia terpolarisasi. Digunakan untuk pembangkit listrik atau proses manufaktur lebih lanjut.
liquid.new-horizon-quantum-liquid.name = Cairan Kuantum
liquid.new-horizon-quantum-liquid.description = Kuantum yang tidak stabil. Dapat digunakan untuk berbagai keperluan industri setelah eksitasi.
liquid.new-horizon-xen-fluid.name = Cairan Xen
liquid.new-horizon-xen-fluid.description = Cairan berenergi tinggi. Dapat menghasilkan banyak energi.
liquid.new-horizon-zeta-fluid-positive.name = Cairan Zeta Positif
liquid.new-horizon-zeta-fluid-positive.description = Cairan positif setelah elektrolisis kristal Zeta. Dapat digunakan untuk pemrosesan kimia dan kembali ke bentuk cairan zeta negatif.
liquid.new-horizon-zeta-fluid-negative.name = Cairan Zeta Negatif
liquid.new-horizon-zeta-fluid-negative.description = Cairan negatif setelah elektrolisis kristal Zeta. Dapat digunakan untuk pemrosesan kimia dan kembali ke bentuk cairan zeta positif.
liquid.new-horizon-irdryon-fluid.name = Cairan Iridium
liquid.new-horizon-irdryon-fluid.description = Cairan phase bersuhu rendah.

liquid.new-horizon-photon.name = Aliran Foton
liquid.new-horizon-photon.description = Foton yang diserap.
liquid.new-horizon-particle-stream.name = Aliran Partikel
#liquid.new-horizon-particle-stream.description =
liquid.new-horizon-neutron-stream.name = Aliran Neutron
#liquid.new-horizon-neutron-stream.description =
liquid.new-horizon-proton-stream.name = Aliran Proton
#liquid.new-horizon-proton-stream.description =
liquid.new-horizon-anti-matter-stream.name = Aliran Antimateri
#liquid.new-horizon-anti-matter-stream.description =
liquid.new-horizon-zeta-positive-stream.name = Aliran Positif Zeta
#liquid.new-horizon-zeta-positive-stream.description =
liquid.new-horizon-zeta-negative-stream.name = Aliran Negatif Zeta
#liquid.new-horizon-zeta-negative-stream.description =

liquid.new-horizon-plo-naq.name = Plo Naq
liquid.new-horizon-plo-naq.description = Cairan koloid dalam kondisi kritis. Dapat dikonfigurasi secara bebas menjadi struktur berkekuatan tinggi apa pun atau digunakan untuk memperbaiki bangunan yang rusak dengan cepat.
liquid.new-horizon-cho-vat.name = Cho Vat
liquid.new-horizon-cho-vat.description = Energi fluida berwarna hijau kromium. Secara signifikan mengurangi kerusakan yang masuk melalui efek disipasi energi.
liquid.new-horizon-kar-ion.name = Kar Ion
liquid.new-horizon-kar-ion.description = Ion berdimensi tinggi dan berdimensi enam. Dapat Menghancurkan objek berdimensi konvensional melalui disosiasi struktural.

#Turret Block
block.new-horizon-bombard.name = Bombard
block.new-horizon-bombard.description = Menara artileri besar.
block.new-horizon-bombard.details = [red]T E M B A K A N - S E R E N T A K !
block.new-horizon-vortex.name = Vortex
block.new-horizon-vortex.description = Menara besar.
block.new-horizon-hive.name = Hive
block.new-horizon-hive.description = Peluncur misil anti-udara jarak jauh.\nMeluncurkan misil dengan lintasan spiral.
block.new-horizon-ancient-artillery.name = Artileri Kuno
block.new-horizon-ancient-artillery.description = Menembakkan proyektil yang kuat.\n\n[sky]Khusus mode editor & sandbox.\n[accent]Senjata yang dapat dikuasai setelah dihancurkan.[]\nPegang kendali senjata ini untuk kontrol medan perang yang lebih baik.
block.new-horizon-prism.name = Prism
block.new-horizon-prism.description = Menembakan sinar laser bermuatan dengan sinar yang lebih kecil yang dipantulkan ke target di dekatnya.
block.new-horizon-interferon.name = Interferon
block.new-horizon-interferon.description = Teknologi Kuno yang tidak diketahui.\nMenembakkan peluru busur yang meledak.
block.new-horizon-beam.name = Beam
block.new-horizon-beam.description = Menembakkan laser ke arah musuh dengan cepat.
block.new-horizon-antibody.name = Antibody
block.new-horizon-antibody.description = Teknologi Kuno yang tidak diketahui\nMenembakkan muatan energi kecil.
block.new-horizon-webber.name = Webber
block.new-horizon-webber.description = Menangkap musuh dengan capit optik.\n\n[accent]Menargetkan musuh yang lebih cepat.
block.new-horizon-gravity.name = Gravity
block.new-horizon-gravity.description = Menembakkan sinar yang dapat menarik beberapa unit sekaligus.
block.new-horizon-eternity.name = Eternity
block.new-horizon-eternity.description = Senjata super strategis-taktis ekstra besar. Sangat mahal, tetapi sangat berharga.
block.new-horizon-eternity.details = "Jurang Utara punya ikan, namanya Kun. Laut Selatan punya meriam, namanya Eternal. Panjangnya beberapa ratusan meter, diameternya beberapa puluhan meter. Begitu berubah menjadi api, meteor-meteor melintas di atas kepala, langit memerah. Setelah meledak, cakrawala bersinar terang, seolah-olah awan ungu turun dari atas langit, memusnahkan semua musuh. Para penguasa dilanda ketakutan, membentuk aliansi untuk melemahkan Qin. Gerbang-gerbang dibuka untuk menyambutnya, namun mereka ragu dan tak berani maju. Dalam negosiasi, mereka menuntut proyek itu dipotong setengah, tetapi sia-sia. Selama beberapa dekade mereka tak berani berkuda ke selatan untuk menggembalakan kuda mereka"\n\nkutipan dari Eternal.\n\nBiaya, skala, dan daya jeranya tak tertandingi. Di bawah tekanan, Eternity dilarang ditempatkan di pangkalan-pangkalan luar negeri, dengan jaminan tidak akan digunakan terlebih dahulu. Proses R&D yang sulit dan biaya yang sangat besar pernah menyebabkan proyek itu ditangguhkan. Memang, konsumsi besar-besaran dari semua jenis sumber daya akan membuat perusahaan yang sudah tidak kaya menjadi semakin terpuruk. Namun sebagai alat tawar-menawar yang strategis, Eternity jarang disimpan dalam keadaan aktif.
block.new-horizon-anti-bullet-turret.name = Interceptor
block.new-horizon-anti-bullet-turret.description = Menara dengan titik pertahanan. Menangkis peluru yang mendekat.
block.new-horizon-anti-bullet-turret.details = Sebenarnya, alat ini menggunakan sirkuit daya dan komputer pengendali tembakan dari Argmot.
block.new-horizon-pulse.name = Pulse
block.new-horizon-pulse.description = Menembakkan semburan peluru ke arah musuh. Memberikan damage kinetik yang lebih besar.
block.new-horizon-pulse.details = Rumor mengatakan bahwa kode nama dalam basis data militer untuk menara ini ialah "Old Mama."
block.new-horizon-dendrite.name = Dendrite
block.new-horizon-dendrite.description = Teknologi Kuno yang tidak diketahui.
block.new-horizon-atom-separator.name = Atom Separator
block.new-horizon-atom-separator.description = Menembakkan laser yang mematikan secara terus-menerus. Menargetkan musuh yang lebih lambat.
block.new-horizon-atom-separator.details = Dijuluki sebagai Pemotong Atom. Konon, menonaktifkan paksa kunci elevasi memungkinkan senjata ini menembak lurus ke langit.\n\n[accent]"Apakah aku baru saja melihat seorang gadis pirang aneh berbaju zirah berdiri di sana?"
block.new-horizon-blood-star.name = Blood Star
block.new-horizon-blood-star.description = Menembakkan bom ion statis.
block.new-horizon-blood-star.details = Magazin amunisi yang siap ditembakkan dapat menyebabkan reaksi berantai yang dahsyat jika terkena tembakan. Lindungi menara meriam ini dengan hati-hati.
block.new-horizon-multiple-launcher.name = Peluncur-Multi
block.new-horizon-multiple-launcher.description = Menara peluncur misil besar.
block.new-horizon-multiple-launcher.details = Dijuluki "Katyusha," yang tampaknya merupakan nama perempuan kuno. Anehnya, julukan ini secara tak terduga populer.\n\nMungkin karena dia suka minum?
block.new-horizon-thermo-turret.name = Thermo
block.new-horizon-thermo-turret.description = Menara pertahanan sederhana yang menembakkan proyektil pelacak dengan mengisi cairan xen.
block.new-horizon-thermo-turret.details = Menara pertahanan yang dioptimalkan untuk ventilasi kimia Midantha. Efek pirolisis cairan xen, yang distimulasi oleh listrik, cukup untuk menghadapi serangan dari unit yang lebih kecil.
block.new-horizon-rail-gun.name = Rail Gun
block.new-horizon-rail-gun.description = Menembakkan baut dengan jarak yang sangat jauh dan kerusakan yang tinggi. Memiliki rotasi yang lambat dan laju tembakan yang rendah.
block.new-horizon-rail-gun.details = Kecepatan peluru yang hampir mendekati Mach 15. Daya tembusnya yang ekstrem memungkinkan peluru ini menembus target apa pun dengan mudah.
block.new-horizon-end-of-era.name = End of Era
block.new-horizon-end-of-era.description = Dapat dilengkapi dengan peluru yang kuat.
block.new-horizon-executor.name = Executioner
block.new-horizon-executor.description = Meluncurkan baut energi bertenaga tinggi yang mengincar musuh.
block.new-horizon-synchro.name = Synchro
block.new-horizon-synchro.description = Menara standar dengan laju tembakan tinggi. Dapat memberikan banyak damage pada unit, tetapi kurang efektif dalam menghancurkan perisai.
block.new-horizon-argmot.name = Argmot
block.new-horizon-argmot.description = Menembakkan gugusan listrik ke arah musuh. Laju tembakan meningkat seiring waktu. Akan kepanasan jika menembak terlalu lama. Memberikan damage dahsyat pada perisai.
block.new-horizon-argmot.details = Pada beban penuh, menara ini menimbulkan kerusakan yang sangat besar, tetapi jika panas berlebih yang dihasilkan tidak dikelola dengan baik, maka menara akan memaksa menghentikan operasi.
block.new-horizon-slavio.name = Slavio
block.new-horizon-slavio.description = Meluncurkan serangkaian misil yang mengejar. Memberikan damage besar pada unit, tetapi kurang efektif pada perisai.
block.new-horizon-concentration.name = Concentration
block.new-horizon-concentration.description = [sky]Semakin lama menembak, [#bf92f9]akan semakin kuat.
block.new-horizon-electro.name = Electro
block.new-horizon-electro.description = Menembakkan peluru energi yang melumpuhkan musuh dan menyebabkan kerusakan berkelanjutan di area yang luas.

